name: publish

# Publishes to npm on a version tag push (e.g. `v0.9.0`, `v0.9.1-1`).
# Uses npm trusted publishing (OIDC) — no NPM_TOKEN secret. Provenance is
# generated automatically. See README "Releasing" for the versioning policy.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # trusted publishing requires Node >= 22.14
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 bundles npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Run tests
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag  package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag version ($tag) does not match package.json version ($pkg)"
            exit 1
          fi

      - name: Publish to npm
        run: |
          version="${GITHUB_REF_NAME#v}"
          # A prerelease version (contains a hyphen, e.g. 0.9.1-1) must NOT become
          # the default `latest` dist-tag; route it to `next` instead.
          if [[ "$version" == *-* ]]; then
            dist_tag=next
          else
            dist_tag=latest
          fi
          echo "Publishing $version under dist-tag '$dist_tag'"
          npm publish --tag "$dist_tag"
